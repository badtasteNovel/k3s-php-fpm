apiVersion: v1
kind: Namespace
metadata:
  name: service
  labels:
    # 告訴 Helm：這個資源是由你管理的
    app.kubernetes.io/managed-by: Helm
  annotations:
    # 告訴 Helm：你是屬於哪個 Release 名稱（這裡對應你最後執行的 helm upgrade 名稱）
    meta.helm.sh/release-name: service
    # 告訴 Helm：這個 Release 是在哪個 Namespace 下執行的
    meta.helm.sh/release-namespace: service
    helm.sh/resource-policy: keep