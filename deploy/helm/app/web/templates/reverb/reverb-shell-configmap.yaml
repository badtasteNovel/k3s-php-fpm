apiVersion: v1
kind: ConfigMap
metadata:
  name: reverb-shell
  namespace: web # <--- 這裡指定門牌號碼
  labels:
    {{ include "base.metadata.labels.managed_by" . | nindent 4 }}
  annotations:
    {{ include "base.metadata.annotations.release" . | nindent 4 }}
data:
  reverb.sh: |
    #!/bin/bash
    while true; do
     php artisan reverb:start
     echo "reverb exited, restarting in 1 second..."
     sleep 1
    done
