apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-default-configuration
  namespace: web # <--- 這裡指定門牌號碼
  labels:
    {{ include "base.metadata.labels.managed_by" . | nindent 4 }}
  annotations:
    {{ include "base.metadata.annotations.release" . | nindent 4 }}
# 這裡維運容易遇到的最大問題 通常在於 websocket 的轉發不合法
# /app/?protocol=x 不合法
# /app/{app_key}/?... 合法
# 原因其實來自於 vite 沒有收到正確的環境變量她收到的環境變量是空值。請在run build 之前將正確的環境變量放入。
data:
  zz-default.conf: |
    set_real_ip_from  10.0.0.0/8;
    real_ip_header    X-Forwarded-For;
    resolver 169.254.20.10 valid=30s;
    resolver_timeout 5s;
    # 開啟剝洋蔥模式，確保抓到的是真正的外來訪客，依照抓取順序，抓到最後一個，而不抓取偽造ip
    # 如若沒有這行 那麼可能可以被偽造標頭 X-Forwarded-For。
    real_ip_recursive on;

    proxy_buffer_size          {{ .Values.nginx.config.buffer.size | default "128k" | quote }};
    proxy_buffers              {{ .Values.nginx.config.buffer.number | default 4 }} {{ .Values.nginx.config.buffer.per_buffer | default "256k" | quote }};
    proxy_busy_buffers_size    {{ .Values.nginx.config.buffer.busy_size | default "256k" | quote }};

    map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
    }

    # 運用volumes 將這個default.conf 掛載到nginx.conf 的位置
    server {
        listen 80;   # 指定為預設 server
        server_name _;
        root /var/www/html/public;
        index index.php index.html;
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
        # = 最高優先級，必須完全匹配
        # ^~ 次高優先級，前綴匹配，但禁止再往下找正則，所以我們後面接正則就不能使用
        # ~ 或者 ~* 正則匹配，優先級略高於 / 
        # / 最低優先級，前綴匹配
        location ^~ /app/ {
            proxy_http_version 1.1;
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;  # 設定為 7 天，基本上等於不斷開
            
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_pass http://php-reverb:8080;
        }
        # 這裡的~ ^ 就是正則了。
        location ~ ^/apps/(?<reverbid>[^/]+)/events$ { # variable reverbid
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_pass http://php-reverb:8080/apps/$reverbid/events$is_args$args;
        }
        # 確保 Nginx 優先處理這些副檔名，不要丟給 PHP
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # 如果你擔心路徑問題，可以強行在這裡指定 root
            # root /var/www/html/public;
            
            expires 1y;
            access_log off;
            add_header Cache-Control "public";
            
            # 測試用：如果還是 404，可以在這裡加一個 Header 來確認請求有進到這
            add_header X-Debug-Nginx-Static "true";
        }
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000; # 指向容器名稱
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        }

        location ~ /\.ht {
            deny all;
        }
    }

