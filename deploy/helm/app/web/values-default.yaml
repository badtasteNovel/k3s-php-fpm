
php_fpm:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

nginx:
  resources:
    requests:
      cpu: "20m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

vite_serve:
  enabled: true

podSecurityContext:
  enabled: true
development:
  enabled: true
  clearLogs: false
  debug: true
  runAsRoot: true
  mount: true

php_image:
  repository: "registry.local/my-dev-php-fpm"
  tag: "debian-bookworm"
  pullPolicy: "Always"