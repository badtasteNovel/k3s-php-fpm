apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    {{ include "base.metadata.labels.managed_by" . | nindent 4 }}
  annotations:
    # 這裡放你原本想寫的第二個名字，作為說明
    network-type: "allow-ingress-from-internal-gateway-namespace-to-service"
    description: "允許來自 internal-gateway 命名空間的 Ingress 流量"
    {{ include "base.metadata.annotations.release" . | nindent 4 }}
  name: service
  namespace: {{ .Release.Namespace | quote }}
spec:
  podSelector: &serviceAppSelector 
    matchLabels:
      io.kompose.network/service-app-network: "true"
  policyTypes:
   - Ingress
   - Egress
  ingress: # 入站流量
    - from:
      # 允許「同一個網路標籤」的人互連
      - podSelector: *serviceAppSelector # 這裡直接引用上面的 Anchor
      - namespaceSelector:
          matchLabels:
            # 這裡填入 internal-gateway 所在的命名空間標籤
            # 如果不確定，可以直接用自動產生的名稱標籤
            kubernetes.io/metadata.name: internal-gateway
        podSelector:
          matchLabels:
            app.kubernetes.io/component: controller
            app.kubernetes.io/instance: internal-gateway
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: web
        podSelector:
          matchLabels:
            io.kompose.service: nginx
  egress:
    - to:
      - podSelector: *serviceAppSelector # 允許 Laravel 連到 Database
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: web
        podSelector:
          matchLabels:
            io.kompose.service: database
            io.kompose.network/web-app-network: "true"
    - ports:
      - port: 53
        protocol: UDP
      - port: 53
        protocol: TCP # 允許查詢 DNS
