apiVersion: v1
kind: ConfigMap
metadata:
  name: database-config
  namespace: {{ .Release.Namespace | quote }}
data:
  # 注意：Key 必須是 .sh，Postgres 才會用 Shell 執行它
  postgresql.conf: |
    max_connections = 200          # Temporal 建議連線數設高一點，100 有時會不夠
    synchronous_commit = off       # 效能大招，對 Temporal 很有感
    wal_writer_delay = 200ms
    max_wal_size = 1GB             # Temporal 寫入頻繁，建議加大 WAL 緩衝
    min_wal_size = 128MB
    checkpoint_timeout = 10min     # 減少 I/O 尖峰
    tcp_keepalives_idle = 60
    tcp_keepalives_interval = 10
    tcp_keepalives_count = 6
    listen_addresses = '*'
  pg_hba.conf: |
    local     all     all                                     trust
    host      all     all            127.0.0.1/32             scram-sha-256
    host      all     all            10.42.0.0/16             scram-sha-256
    host      all     all            10.43.0.0/16             scram-sha-256
    host      all     all            10.0.0.0/24              scram-sha-256
  setup.sh: |
    #!/bin/bash
    set -e
  
    
    # 初始化資料庫權限
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -c "CREATE USER \"${DB_USER}\" WITH PASSWORD '${DB_PASSWORD}' CREATEDB;" \
      -c "ALTER USER \"${DB_USER}\" WITH CREATEDB;"
    
    # 2. 給予在 public schema 建立物件的權限 (這對跑 schema 建立 Table 至關重要)
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -c "GRANT CONNECT ON DATABASE \"${POSTGRES_DB}\" TO \"${DB_USER}\";" \
      -c "GRANT USAGE, CREATE ON SCHEMA public TO \"${DB_USER}\";" \
      -c "ALTER USER \"${DB_USER}\" SET search_path TO public;" \
      -c "ALTER DATABASE \"${POSTGRES_DB}\" SET tcp_keepalives_idle = 60;"