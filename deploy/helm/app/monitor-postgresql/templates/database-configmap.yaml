apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  postgresql.conf: |
    max_connections = 50
    synchronous_commit = off
    wal_writer_delay = 200ms
    max_wal_size = 256MB
    min_wal_size = 80MB
    checkpoint_timeout = 5min
    tcp_keepalives_idle = 60
    tcp_keepalives_interval = 10
    listen_addresses = '*'
  pg_hba.conf: |
    local     all     all                                     trust
    host      all     all            127.0.0.1/32             scram-sha-256
    host      all     all            10.42.0.0/16             scram-sha-256
    host      all     all            10.43.0.0/16             scram-sha-256
    host      all     all            10.0.0.0/24              scram-sha-256
  setup.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -c "CREATE USER \"${DB_USER}\" WITH PASSWORD '${DB_PASSWORD}';"

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -c "GRANT CONNECT ON DATABASE \"${POSTGRES_DB}\" TO \"${DB_USER}\";" \
      -c "GRANT USAGE, CREATE ON SCHEMA public TO \"${DB_USER}\";" \
      -c "ALTER USER \"${DB_USER}\" SET search_path TO public;" \
      -c "ALTER DATABASE \"${POSTGRES_DB}\" SET tcp_keepalives_idle = 60;"

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -c "CREATE DATABASE telescope;" \
      -c "GRANT CONNECT ON DATABASE telescope TO \"${DB_USER}\";"

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "telescope" \
      -c "GRANT USAGE, CREATE ON SCHEMA public TO \"${DB_USER}\";" \
      -c "ALTER DATABASE telescope SET tcp_keepalives_idle = 60;"
