apiVersion: v1
kind: ConfigMap
metadata:
  name: local-registry-config
data:
  config.yml: |-
    version: 0.1
    log:
      fields:
        service: registry
    storage:
      cache:
        blobdescriptor: inmemory
      filesystem:
        rootdirectory: /var/lib/registry
      delete:
        enabled: true
    http:
      addr: :5000
      headers:
        X-Content-Type-Options: [nosniff]
    # 如果你之前在 env 設定的 CORS 沒生效，可以直接寫在這裡
    # 但建議維持由 Deployment 的 env 注入，這裡保持基本儲存設定即可