# 固定為default，因為local-registry得是最早的部署。所有k3s image 從local-registry傳入。
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: local-registry
    {{ include "base.metadata.labels.managed_by" . | nindent 4 }}
  namespace: default
  name: local-registry
  annotations:
    {{ include "base.metadata.annotations.release" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
      io.kompose.service: local-registry
  template:
    metadata:
      labels:
        app: registry
        io.kompose.service: local-registry
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: registry
          image: {{ printf "%s:%s" (.Values.image.repository | default "registry") (.Values.image.tag | default "2") | quote }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            {{- range $key, $val := .Values.extraEnv }}
              - name: {{ $key }}
                {{- if eq $key "REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin" }}
                value: {{ printf "[\"%s:%d\"]" $val (int $.Values.GUI_PORT) | quote }}
                  {{- else }}
                value: {{ $val | quote }}
                  {{- end }}
            {{- end }}
              - name: REGISTRY_STORAGE_DELETE_ENABLED
                value: "true"
              - name: REGISTRY_AUTH
                value: htpasswd
              - name: REGISTRY_AUTH_HTPASSWD_REALM
                value: Registry Realm
              - name: REGISTRY_AUTH_HTPASSWD_PATH
                value: /auth/htpasswd
            {{- if .Values.ca }}
              - name: REGISTRY_HTTP_TLS_CERTIFICATE
                value: /certs/tls.crt
              - name: REGISTRY_HTTP_TLS_KEY
                value: /certs/tls.key
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
            - name: auth
              mountPath: /auth
              readOnly: true
            {{- if .Values.ca }}
            - name: tls
              mountPath: /certs
              readOnly: true
            {{- end }}
          resources:                  # ✅ 移到與 volumeMounts 同層
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-pvc
        - name: auth
          secret:
            secretName: registry-auth
        - name: registry-config      # ✅ 新增
          configMap:
            name: local-registry-config
            items:
              - key: config.yml
                path: config.yml
        {{- if .Values.ca }}
        - name: tls
          secret:
            secretName: registry-ca
        {{- end }}