apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.hostName | quote }}
  namespace: default # <--- 這裡指定門牌號碼
  labels:
    {{ include "base.metadata.labels.managed_by" . | nindent 4 }}
  annotations:
    {{ include "base.metadata.annotations.release" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: local-registry
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http

