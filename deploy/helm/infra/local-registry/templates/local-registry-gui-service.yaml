apiVersion: v1
kind: Service
metadata:
  name: local-registry-gui-service
  namespace: default # <--- 這裡指定門牌號碼
  labels:
    {{ include "base.metadata.labels.managed_by" . | nindent 4 }}
  annotations:
    {{ include "base.metadata.annotations.release" . | nindent 4 }}
spec:
  selector:
    io.kompose.service: local-registry-gui
  ports:
    - port: 80      # 這是 Service 的 ClusterIP 埠口
      targetPort: 80  # 這是 Pod 裡面 Registry 實際監聽的埠口

