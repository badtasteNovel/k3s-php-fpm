{{- if .Values.GUI -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: default
  name: registry-ui
  labels:
    io.kompose.service: local-registry-gui
    {{ include "base.metadata.labels.managed_by" . | nindent 4 }}
  annotations:
    {{ include "base.metadata.annotations.release" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: local-registry-gui
      app: registry-ui
  template:
    metadata:
      labels:
        io.kompose.service: local-registry-gui
        app: registry-ui
    spec:
      containers:
        - name: registry-ui
          image:  {{ printf "%s:%s" (.Values.gui_image.repository | default "registry-ui") (.Values.gui_image.tag | default "latest") | quote }}
          imagePullPolicy: {{ .Values.gui_image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: NGINX_PROXY_PASS_URL
              value: {{ printf "http://%s.%s.svc.cluster.local:%s" .Values.hostName .Release.Namespace (.Values.port | toString) | quote }}
            - name: SINGLE_REGISTRY
              value: "true"

            - name: DELETE_IMAGES
              value: {{ .Values.gui_config.delete_images | quote }}
            - name: CATALOG_ELEMENTS_LIMIT
              value: {{ .Values.gui_config.catalog_limit | quote }}
            

          
      resources:
          requests:
              memory: "32Mi"
              cpu: "10m"
          limits:
              memory: "128Mi" # 限制它不准亂吃記憶體
              cpu: "500m"     # 讓介面反應靈敏即可
{{- end }}