cilium:
  kubeProxyReplacement: "true"
  socketLB:
    enabled: true
  bpf:
    masquerade: true # 讓 Pod 出網的流量用 eBPF 處理，這在 K8s 內部是一致的
    hostLegacyRouting: true
  routingMode: "tunnel"
  tunnelProtocol: "vxlan" # 生產環境若跨網段也常用此模式，且對 Host 路由表最乾淨
  k8sServiceHost: "127.0.0.1"
  k8sServicePort: 6443
  mtu: 1450
  devices: "eth+"
  k8sNodeAgency:
    bootstrap: true
  autoDirectNodeRoutes: false
  ipam:
    mode: "cluster-pool"
  operator:
    replicas: 1
  # 開發環境建議開啟 Hubble
  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: true
    tls:
      auto:
        method: cronJob
