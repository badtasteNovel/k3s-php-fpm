apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-gateway
  namespace: {{ .Release.Namespace | quote }}
  labels:
    tier: gateway
    {{ include "common.gateway.metadata.labels.managed_by" . | nindent 4 }}
  annotations:
    {{ include "common.gateway.metadata.annotations.release" . | nindent 4 }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.pulse.middlewares }}
spec:
  ingressClassName: external-traefik
  tls:
  - hosts:
    - {{ .Values.pulse.hostname }}
  rules:
  - host: {{ .Values.pulse.hostname }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: external-gateway-proxy
            port:
              number: 80
