apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: pulse-ip-allowlist
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{ include "common.gateway.metadata.labels.managed_by" . | nindent 4 }}
spec:
  ipAllowList:
    sourceRange:
      - 127.0.0.1/32
      - 192.168.0.65/32
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: registry-rate-limit
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{ include "common.gateway.metadata.labels.managed_by" . | nindent 4 }}
spec:
  rateLimit:
    average: 100
    burst: 200
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: registry-ip-allowlist
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{ include "common.gateway.metadata.labels.managed_by" . | nindent 4 }}
spec:
  ipAllowList:
    sourceRange:
      - 127.0.0.0/8
      - 192.168.0.0/16
      - 10.42.0.0/16
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: external-security-headers
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{ include "common.gateway.metadata.labels.managed_by" . | nindent 4 }}
spec:
  headers:
    customResponseHeaders:
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
      X-Frame-Options: "SAMEORIGIN"
      X-XSS-Protection: "1; mode=block"
      X-Content-Type-Options: "nosniff"
      Referrer-Policy: "strict-origin-when-cross-origin"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: external-body-size
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{ include "common.gateway.metadata.labels.managed_by" . | nindent 4 }}
spec:
  buffering:
    maxRequestBodyBytes: 57671680  # 55m，稍大於 php max memory limit
    retryExpression: "IsNetworkError() && Attempts() < 2"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: external-rate-limit
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{ include "common.gateway.metadata.labels.managed_by" . | nindent 4 }}
spec:
  rateLimit:
    average: 10   # 每秒平均 10 req / IP
    burst: 50     # 爆發最多 50 req（對應原本 limit-burst-multiplier: 5）
