# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'
tasks:
  default:
    desc: "🖥️ 完整本地開發環境（網路 + 入口 + 應用）"
    silent: true
    cmds:
      - kubectl apply -k deploy/k8s/base
      - task: network
      - task: cert
      - task: ingress
      - task trust:registry
      - task secret:registry-auth
      - task: registry
      - task manual:registry-login
      - task: push-static-images
      - task: push-images
      - task: app
      - task: registry-auth


  registry-auth:
    desc: "🔑 patch default serviceaccount 讓 web/service namespace 自動帶 imagePullSecrets"
    silent: true
    cmds:
      - |
        PULL_SECRET="local-registry-auth"
        for NS in web service; do
          kubectl patch serviceaccount default -n "$NS" \
            -p "{\"imagePullSecrets\": [{\"name\": \"${PULL_SECRET}\"}]}" 2>/dev/null \
            && echo "✅ default serviceaccount ($NS): imagePullSecrets 已設定" \
            || echo "⚠️  serviceaccount patch ($NS): namespace 不存在，跳過"
        done

  app:
    desc: "📦 直接 Helm 部署應用，不套 production values（不透過 ArgoCD）"
    silent: true
    cmds:
      - helm upgrade --install web-database ./deploy/helm/app/web-database
          --namespace web
          --values deploy/helm/app/web-database/values-default.yaml
      - helm upgrade --install redis ./deploy/helm/app/redis
          --namespace web
          --values deploy/helm/app/redis/values-default.yaml
      - helm upgrade --install web ./deploy/helm/app/web
          --namespace web
          --values deploy/helm/app/web/values-default.yaml
          --set development.mountPath={{.ROOT_DIR}}
      - task: pulse
      - helm upgrade --install workflow-database ./deploy/helm/app/workflow-database
          --namespace service
          --values deploy/helm/app/workflow-database/values-default.yaml
      - helm upgrade --install service ./deploy/helm/app/services
          --namespace service
          --values deploy/helm/app/services/values-default.yaml
      - |
        DB_USER="$(grep '^TEMPORAL_DB_USER=' environment/.env | cut -d'=' -f2-)"
        helm upgrade --install temporal temporal \
          --repo https://go.temporal.io/helm-charts \
          --version 0.73.2 \
          --namespace service \
          --values deploy/values/temporal/values.yaml \
          --values deploy/values/temporal/values-default.yaml \
          --set "server.config.persistence.default.sql.user=$DB_USER" \
          --set "server.config.persistence.visibility.sql.user=$DB_USER"

  pulse:
    desc: "📊 部署 monitor 監控基礎設施（pulse-redis、monitor-postgresql）"
    silent: true
    cmds:
      - helm upgrade --install pulse-redis ./deploy/helm/app/pulse-redis
          --namespace monitor
          --create-namespace
          --values deploy/helm/app/pulse-redis/values-default.yaml
      - helm upgrade --install monitor-postgresql ./deploy/helm/app/monitor-postgresql
          --namespace monitor
          --create-namespace
          --values deploy/helm/app/monitor-postgresql/values-default.yaml

  network:
    desc: "🌐 部署網路基礎（Cilium 必須最先啟動，因為 kube-proxy 已移除）"
    silent: true
    cmds:
      - kubectl apply -k deploy/k8s/base
      - helm dependency update ./deploy/helm/infra/cilium
      - helm upgrade --install cilium ./deploy/helm/infra/cilium
          --namespace kube-system
          --values deploy/helm/infra/cilium/values-default.yaml
          --wait --timeout 900s
      - helm repo add csi-driver-smb https://raw.githubusercontent.com/kubernetes-csi/csi-driver-smb/master/charts
      - helm upgrade --install csi-driver-smb csi-driver-smb/csi-driver-smb
          --version 1.20.0
          --namespace kube-system
          --wait
      - helm upgrade --install node-local-dns oci://ghcr.io/deliveryhero/helm-charts/node-local-dns
          --version 2.1.0
          --namespace kube-system
          --set config.bindIp=169.254.20.10
          --set config.localDns=169.254.20.10
          --set config.dnsServer=10.43.0.10
          --set config.noIPv6Lookups=true

  ingress:
    desc: "🔀 初始化 Traefik（external / internal gateway）"
    silent: true
    cmds:
      - helm dependency update ./deploy/helm/infra/gateways/charts/common
      - helm dependency update ./deploy/helm/infra/gateways/charts/external
      - helm dependency update ./deploy/helm/infra/gateways/charts/internal
      - helm upgrade --install external-gateway ./deploy/helm/infra/gateways/charts/external
          --namespace gateway
          --create-namespace
          --values deploy/helm/infra/gateways/charts/external/values.yaml
          --values deploy/helm/infra/gateways/charts/external/values-default.yaml
      - helm upgrade --install internal-gateway ./deploy/helm/infra/gateways/charts/internal
          --namespace internal-gateway
          --create-namespace
          --values deploy/helm/infra/gateways/charts/internal/values.yaml
          --values deploy/helm/infra/gateways/charts/internal/values-default.yaml



  push-static-images:
    desc: "🛠️ 建置 CI 所需 image 並推至 local registry（開發用 registry.local）"
    silent: true
    cmds:
      - |
        docker image inspect my-php-base:8.4 > /dev/null 2>&1 \
          && echo "✅ my-php-base:8.4 已存在，跳過建置" \
          || docker build -f docker/web/app/php-fpm/base.Dockerfile -t my-php-base:8.4 .
      - |
        docker image inspect my-ops-toolbox:latest > /dev/null 2>&1 \
          && echo "✅ my-ops-toolbox:latest 已存在，跳過建置" \
          || docker build -f docker/ops/toolbox.Dockerfile -t my-ops-toolbox:latest .
      - |
        docker image inspect my-ci-runner:latest > /dev/null 2>&1 \
          && echo "✅ my-ci-runner:latest 已存在，跳過建置" \
          || docker build -f docker/ops/ci-runner.Dockerfile -t my-ci-runner:latest .
      - |
        for image in \
          "my-php-base:8.4" \
          "my-ops-toolbox:latest" \
          "my-ci-runner:latest"; do
          name="${image%%:*}"
          tag="${image##*:}"
          docker tag ${image} registry.local/${name}:${tag}
          docker push registry.local/${name}:${tag}
        done

  push-images:
    desc: "🔨 建置並推送開發用 image（my-dev-php-fpm、my-vite-server、my-inner-unprivileged-nginx）"
    silent: true
    cmds:
      - |
        REGISTRY="registry.local"

        # my-php-release（my-dev-php-fpm 的基底，需要 my-php-base）
        docker pull ${REGISTRY}/my-php-base:8.4 && docker tag ${REGISTRY}/my-php-base:8.4 my-php-base:8.4
        docker build --target main \
          -f ./docker/web/app/php-fpm/builder.Dockerfile \
          -t my-php-builder:8.4 \
          --secret id=build_env,src=.env .
        docker build -f ./docker/web/app/php-fpm/release.Dockerfile \
          -t my-php-release:debian-bookworm .

        # my-dev-php-fpm
        docker build -f ./docker/web/app/php-fpm/dev/dev.Dockerfile \
          -t my-dev-php-fpm:debian-bookworm .

        # my-vite-server
        docker build -f ./docker/web/app/vite-serve/Dockerfile.vite-serve \
          -t my-vite-server:20-bookworm .

        # my-inner-unprivileged-nginx
        docker build -f ./docker/web/app/nginx/Dockerfile.nginx \
          -t my-inner-unprivileged-nginx:alpine .

        # 推送至 registry
        for image in \
          "my-dev-php-fpm:debian-bookworm" \
          "my-vite-server:20-bookworm" \
          "my-inner-unprivileged-nginx:alpine"; do
          name="${image%%:*}"
          tag="${image##*:}"
          docker tag ${image} ${REGISTRY}/${name}:${tag}
          docker push ${REGISTRY}/${name}:${tag}
        done

  cert:
    desc: "🔐 部署 cert-manager 及 local CA issuer、應用層憑證"
    silent: true
    cmds:
      - helm upgrade --install cert-manager oci://quay.io/jetstack/charts/cert-manager
          --version v1.20.1
          --namespace cert-manager
          --create-namespace
          --set crds.enabled=true
          --wait
      - kubectl wait --for=condition=Available deployment/cert-manager-webhook
          --namespace cert-manager --timeout=120s
      - helm upgrade --install cert-issue ./deploy/helm/infra/cert-manager
          --namespace cert-manager
          --wait
      - helm upgrade --install app-certifications ./deploy/helm/infra/app-certifications
          --namespace cert-manager
      - kubectl wait --for=condition=Ready certificate/printer-cert
          --namespace web --timeout=120s



  registry:
    desc: "🗂️ 部署 local registry（local-registry、k3s-maintenance）"
    silent: true
    cmds:
      - helm upgrade --install local-registry ./deploy/helm/infra/local-registry
          --namespace default
          --values deploy/helm/infra/local-registry/values.yaml
          --values deploy/helm/infra/local-registry/values-default.yaml
      - helm upgrade --install k3s-maintenance ./deploy/helm/infra/k3s-maintenance
          --namespace kube-system
          --values deploy/helm/infra/k3s-maintenance/values.yaml
          --values deploy/helm/infra/k3s-maintenance/values-default.yaml
      - kubectl apply -k deploy/k8s/base

