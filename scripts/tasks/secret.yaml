# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'
tasks:

  default:
    desc: "建立應用層 K8s secrets（不含生產基礎設施）"
    silent: true
    cmds:
      - kubectl apply -k deploy/k8s/base
      - task: printer-cert
      - task: qztray-secret
      - task: app-env-secret
      - task: app-env-database-secret-web
      - task: workflow-database-secret
      - task: pulse-redis-secret
      - task: monitor-postgresql-secret
      - task: registry-auth

  production:
    desc: "建立生產基礎設施 secrets（Forgejo、ArgoCD）"
    silent: true
    cmds:
      - task: forgejo-db-secret
      - task: forgejo-admin-secret
      - task: forgejo-runner-config
      - task: argocd-repo-creds
      - task: ssh-git-creds

  printer-cert:
    internal: true
    silent: true
    cmds:
      - mkdir -p ./storage/app/qztray-public ./storage/app/qztray-private
      - |
        openssl req -x509 -newkey rsa:2048 \
          -keyout ./storage/app/qztray-private/key.pem \
          -out ./storage/app/qztray-public/cert.pem \
          -days 3650 -nodes \
          -subj "/C=TW/ST=Taiwan/L=Taichung/O=Sureway/OU=IT/CN=sureway.local"

  qztray-secret:
    internal: true
    silent: true
    cmds:
      - |
        kubectl create secret generic qztray-secret \
          --from-file=cert.pem=./storage/app/qztray-public/cert.pem \
          --from-file=key.pem=./storage/app/qztray-private/key.pem \
          -n web --dry-run=client -o yaml | kubectl apply -f -


  app-env-secret:
    internal: true
    silent: true
    cmds:
      - |
        for ns in web service forgejo; do
          existing=$(kubectl get secret app-env-secret -n $ns -o jsonpath='{.data}' 2>/dev/null || true)
          new=$(kubectl create secret generic app-env-secret --from-env-file=.env -n $ns --dry-run=client -o jsonpath='{.data}' 2>/dev/null)
          if [ "$existing" = "$new" ]; then
            echo "✅ app-env-secret ($ns): 內容一致，跳過"
          else
            kubectl delete secret app-env-secret -n $ns --ignore-not-found
            kubectl create secret generic app-env-secret --from-env-file=.env -n $ns
            echo "🔄 app-env-secret ($ns): 已重新建立"
          fi
        done

  app-env-database-secret-web:
    internal: true
    silent: true
    vars:
      ENV: ./environment/.env
    cmds:
      - |
        POSTGRES_DB="$(grep '^APP_POSTGRES_DB=' {{.ENV}} | cut -d'=' -f2-)"
        POSTGRES_USER="$(grep '^APP_POSTGRES_USER=' {{.ENV}} | cut -d'=' -f2-)"
        POSTGRES_PASSWORD="$(grep '^APP_POSTGRES_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        DB_MIGRATE_USERNAME="$(grep '^APP_DB_MIGRATE_USERNAME=' {{.ENV}} | cut -d'=' -f2-)"
        DB_MIGRATE_PASSWORD="$(grep '^APP_DB_MIGRATE_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        DB_USER="$(grep '^APP_DB_USER=' {{.ENV}} | cut -d'=' -f2-)"
        DB_PASSWORD="$(grep '^APP_DB_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        DB_BACKUP_USERNAME="$(grep '^APP_DB_BACKUP_USERNAME=' {{.ENV}} | cut -d'=' -f2-)"
        DB_BACKUP_PASSWORD="$(grep '^APP_DB_BACKUP_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        [ -z "$POSTGRES_DB" ]         && echo "❌ APP_POSTGRES_DB 未設定"         && exit 1
        [ -z "$POSTGRES_USER" ]       && echo "❌ APP_POSTGRES_USER 未設定"       && exit 1
        [ -z "$POSTGRES_PASSWORD" ]   && echo "❌ APP_POSTGRES_PASSWORD 未設定"   && exit 1
        [ -z "$DB_MIGRATE_USERNAME" ] && echo "❌ APP_DB_MIGRATE_USERNAME 未設定" && exit 1
        [ -z "$DB_MIGRATE_PASSWORD" ] && echo "❌ APP_DB_MIGRATE_PASSWORD 未設定" && exit 1
        [ -z "$DB_USER" ]             && echo "❌ APP_DB_USER 未設定"             && exit 1
        [ -z "$DB_PASSWORD" ]         && echo "❌ APP_DB_PASSWORD 未設定"         && exit 1
        [ -z "$DB_BACKUP_USERNAME" ]  && echo "❌ APP_DB_BACKUP_USERNAME 未設定"  && exit 1
        [ -z "$DB_BACKUP_PASSWORD" ]  && echo "❌ APP_DB_BACKUP_PASSWORD 未設定"  && exit 1
        existing=$(kubectl get secret app-env-database-secret -n web -o jsonpath='{.data}' 2>/dev/null || true)
        new=$(kubectl create secret generic app-env-database-secret \
          --from-literal=POSTGRES_DB="$POSTGRES_DB" \
          --from-literal=POSTGRES_USER="$POSTGRES_USER" \
          --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
          --from-literal=DB_MIGRATE_USERNAME="$DB_MIGRATE_USERNAME" \
          --from-literal=DB_MIGRATE_PASSWORD="$DB_MIGRATE_PASSWORD" \
          --from-literal=DB_USER="$DB_USER" \
          --from-literal=DB_PASSWORD="$DB_PASSWORD" \
          --from-literal=DB_BACKUP_USERNAME="$DB_BACKUP_USERNAME" \
          --from-literal=DB_BACKUP_PASSWORD="$DB_BACKUP_PASSWORD" \
          -n web --dry-run=client -o jsonpath='{.data}' 2>/dev/null)
        if [ "$existing" = "$new" ]; then
          echo "✅ app-env-database-secret (web): 內容一致，跳過"
        else
          kubectl delete secret app-env-database-secret -n web --ignore-not-found
          kubectl create secret generic app-env-database-secret \
            --from-literal=POSTGRES_DB="$POSTGRES_DB" \
            --from-literal=POSTGRES_USER="$POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=DB_MIGRATE_USERNAME="$DB_MIGRATE_USERNAME" \
            --from-literal=DB_MIGRATE_PASSWORD="$DB_MIGRATE_PASSWORD" \
            --from-literal=DB_USER="$DB_USER" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=DB_BACKUP_USERNAME="$DB_BACKUP_USERNAME" \
            --from-literal=DB_BACKUP_PASSWORD="$DB_BACKUP_PASSWORD" \
            -n web
          echo "🔄 app-env-database-secret (web): 已重新建立"
        fi

  workflow-database-secret:
    internal: true
    silent: true
    vars:
      ENV: ./environment/.env
    cmds:
      - |
        POSTGRES_DB="$(grep '^TEMPORAL_POSTGRES_DB=' {{.ENV}} | cut -d'=' -f2-)"
        POSTGRES_USER="$(grep '^TEMPORAL_POSTGRES_USER=' {{.ENV}} | cut -d'=' -f2-)"
        POSTGRES_PASSWORD="$(grep '^TEMPORAL_POSTGRES_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        DB_USER="$(grep '^TEMPORAL_DB_USER=' {{.ENV}} | cut -d'=' -f2-)"
        DB_PASSWORD="$(grep '^TEMPORAL_DB_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        [ -z "$POSTGRES_DB" ]       && echo "❌ TEMPORAL_POSTGRES_DB 未設定"       && exit 1
        [ -z "$POSTGRES_USER" ]     && echo "❌ TEMPORAL_POSTGRES_USER 未設定"     && exit 1
        [ -z "$POSTGRES_PASSWORD" ] && echo "❌ TEMPORAL_POSTGRES_PASSWORD 未設定" && exit 1
        [ -z "$DB_USER" ]           && echo "❌ TEMPORAL_DB_USER 未設定"           && exit 1
        [ -z "$DB_PASSWORD" ]       && echo "❌ TEMPORAL_DB_PASSWORD 未設定"       && exit 1
        existing=$(kubectl get secret workflow-database-secret -n service -o jsonpath='{.data}' 2>/dev/null || true)
        new=$(kubectl create secret generic workflow-database-secret \
          --from-literal=POSTGRES_DB="$POSTGRES_DB" \
          --from-literal=POSTGRES_USER="$POSTGRES_USER" \
          --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
          --from-literal=DB_USER="$DB_USER" \
          --from-literal=DB_PASSWORD="$DB_PASSWORD" \
          --from-literal=password="$DB_PASSWORD" \
          -n service --dry-run=client -o jsonpath='{.data}' 2>/dev/null)
        if [ "$existing" = "$new" ]; then
          echo "✅ workflow-database-secret: 內容一致，跳過"
        else
          kubectl delete secret workflow-database-secret -n service --ignore-not-found
          kubectl create secret generic workflow-database-secret \
            --from-literal=POSTGRES_DB="$POSTGRES_DB" \
            --from-literal=POSTGRES_USER="$POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=DB_USER="$DB_USER" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=password="$DB_PASSWORD" \
            -n service
          echo "🔄 workflow-database-secret: 已重新建立"
        fi

  pulse-redis-secret:
    internal: true
    silent: true
    vars:
      ENV: ./.env
    cmds:
      - |
        REDIS_PASSWORD="$(grep '^PULSE_REDIS_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        [ -z "$REDIS_PASSWORD" ] && echo "❌ PULSE_REDIS_PASSWORD 未設定" && exit 1
        existing=$(kubectl get secret pulse-redis-secret -n monitor -o jsonpath='{.data}' 2>/dev/null || true)
        new=$(kubectl create secret generic pulse-redis-secret \
          --from-literal=REDIS_PASSWORD="$REDIS_PASSWORD" \
          -n monitor --dry-run=client -o jsonpath='{.data}' 2>/dev/null)
        if [ "$existing" = "$new" ]; then
          echo "✅ pulse-redis-secret (monitor): 內容一致，跳過"
        else
          kubectl delete secret pulse-redis-secret -n monitor --ignore-not-found
          kubectl create secret generic pulse-redis-secret \
            --from-literal=REDIS_PASSWORD="$REDIS_PASSWORD" \
            -n monitor
          echo "🔄 pulse-redis-secret (monitor): 已重新建立"
        fi

  monitor-postgresql-secret:
    internal: true
    silent: true
    vars:
      ENV: ./.env
    cmds:
      - |
        POSTGRES_DB="$(grep '^PULSE_DB_DATABASE=' {{.ENV}} | cut -d'=' -f2-)"
        POSTGRES_USER="$(grep '^MONITOR_DB_SUPER_USER=' {{.ENV}} | cut -d'=' -f2-)"
        POSTGRES_PASSWORD="$(grep '^MONITOR_DB_SUPER_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        DB_USER="$(grep '^MONITOR_DB_USERNAME=' {{.ENV}} | cut -d'=' -f2-)"
        DB_PASSWORD="$(grep '^MONITOR_DB_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        [ -z "$POSTGRES_DB" ]       && echo "❌ PULSE_DB_DATABASE 未設定"         && exit 1
        [ -z "$POSTGRES_USER" ]     && echo "❌ MONITOR_DB_SUPER_USER 未設定"     && exit 1
        [ -z "$POSTGRES_PASSWORD" ] && echo "❌ MONITOR_DB_SUPER_PASSWORD 未設定" && exit 1
        [ -z "$DB_USER" ]           && echo "❌ MONITOR_DB_USERNAME 未設定"       && exit 1
        [ -z "$DB_PASSWORD" ]       && echo "❌ MONITOR_DB_PASSWORD 未設定"       && exit 1
        existing=$(kubectl get secret monitor-postgresql-secret -n monitor -o jsonpath='{.data}' 2>/dev/null || true)
        new=$(kubectl create secret generic monitor-postgresql-secret \
          --from-literal=POSTGRES_DB="$POSTGRES_DB" \
          --from-literal=POSTGRES_USER="$POSTGRES_USER" \
          --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
          --from-literal=DB_USER="$DB_USER" \
          --from-literal=DB_PASSWORD="$DB_PASSWORD" \
          -n monitor --dry-run=client -o jsonpath='{.data}' 2>/dev/null)
        if [ "$existing" = "$new" ]; then
          echo "✅ monitor-postgresql-secret (monitor): 內容一致，跳過"
        else
          kubectl delete secret monitor-postgresql-secret -n monitor --ignore-not-found
          kubectl create secret generic monitor-postgresql-secret \
            --from-literal=POSTGRES_DB="$POSTGRES_DB" \
            --from-literal=POSTGRES_USER="$POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=DB_USER="$DB_USER" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            -n monitor
          echo "🔄 monitor-postgresql-secret (monitor): 已重新建立"
        fi

  forgejo-db-secret:
    internal: true
    silent: true
    vars:
      ENV: ./environment/.env
    cmds:
      - |
        POSTGRES_DB="$(grep '^FORGEJO_POSTGRES_DB=' {{.ENV}} | cut -d'=' -f2-)"
        POSTGRES_USER="$(grep '^FORGEJO_POSTGRES_USER=' {{.ENV}} | cut -d'=' -f2-)"
        POSTGRES_PASSWORD="$(grep '^FORGEJO_POSTGRES_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        DB_BACKUP_USERNAME="$(grep '^FORGEJO_DB_BACKUP_USERNAME=' {{.ENV}} | cut -d'=' -f2-)"
        DB_BACKUP_PASSWORD="$(grep '^FORGEJO_DB_BACKUP_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        [ -z "$POSTGRES_DB" ]         && echo "❌ FORGEJO_POSTGRES_DB 未設定"         && exit 1
        [ -z "$POSTGRES_USER" ]       && echo "❌ FORGEJO_POSTGRES_USER 未設定"       && exit 1
        [ -z "$POSTGRES_PASSWORD" ]   && echo "❌ FORGEJO_POSTGRES_PASSWORD 未設定"   && exit 1
        [ -z "$DB_BACKUP_USERNAME" ]  && echo "❌ FORGEJO_DB_BACKUP_USERNAME 未設定"  && exit 1
        [ -z "$DB_BACKUP_PASSWORD" ]  && echo "❌ FORGEJO_DB_BACKUP_PASSWORD 未設定"  && exit 1
        if ! kubectl get secret forgejo-db-secret -n forgejo &>/dev/null; then
          kubectl create secret generic forgejo-db-secret \
            --from-literal=POSTGRES_DB="$POSTGRES_DB" \
            --from-literal=POSTGRES_USER="$POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=DB_BACKUP_USERNAME="$DB_BACKUP_USERNAME" \
            --from-literal=DB_BACKUP_PASSWORD="$DB_BACKUP_PASSWORD" \
            -n forgejo --dry-run=client -o yaml | kubectl apply -f -
        fi

  forgejo-runner-config:
    desc: "🤖 向 Forgejo 註冊 runner，建立 forgejo-runner-secret 與 forgejo-runner-config secret"
    silent: true
    vars:
      NAMESPACE: forgejo
      ENV: ./environment/.env
    cmds:
      - |
        CONFIG_INSTANCE="http://forgejo-http.forgejo.svc.cluster.local:3000"

        CONFIG_TOKEN="$(grep '^RUNNER_CONFIG_TOKEN=' {{.ENV}} | cut -d'=' -f2-)"
        if [ -z "$CONFIG_TOKEN" ]; then
          gum style \
            --foreground 196 --border double --border-foreground 196 \
            --bold --align center --width 60 --padding "1 4" \
            "⚠️  RUNNER_CONFIG_TOKEN 未設定" \
            "" \
            "請先從 Forgejo 管理介面取得 Runner Registration Token" \
            "並填入 environment/.env：" \
            "RUNNER_CONFIG_TOKEN=<your-token>" \
            "" \
            "跳過 forgejo-runner-config 建立"
          exit 0
        fi

        CONFIG_NAME="$(grep '^RUNNER_CONFIG_NAME=' {{.ENV}} | cut -d'=' -f2-)"
        if [ -z "$CONFIG_NAME" ]; then
          CONFIG_NAME=$(gum input --placeholder "請輸入 Runner 名稱" --prompt "> ")
          [ -z "$CONFIG_NAME" ] && echo "❌ Runner 名稱不可為空" && exit 1
        fi

        # forgejo-runner-secret（比對後決定是否重建）
        existing_rs=$(kubectl get secret forgejo-runner-secret -n {{.NAMESPACE}} -o jsonpath='{.data}' 2>/dev/null || true)
        new_rs=$(kubectl create secret generic forgejo-runner-secret \
          --from-literal=CONFIG_NAME="$CONFIG_NAME" \
          --from-literal=CONFIG_INSTANCE="$CONFIG_INSTANCE" \
          --from-literal=CONFIG_TOKEN="$CONFIG_TOKEN" \
          -n {{.NAMESPACE}} --dry-run=client -o jsonpath='{.data}' 2>/dev/null)
        if [ "$existing_rs" = "$new_rs" ]; then
          echo "✅ forgejo-runner-secret: 內容一致，跳過"
        else
          kubectl delete secret forgejo-runner-secret -n {{.NAMESPACE}} --ignore-not-found
          kubectl create secret generic forgejo-runner-secret \
            --from-literal=CONFIG_NAME="$CONFIG_NAME" \
            --from-literal=CONFIG_INSTANCE="$CONFIG_INSTANCE" \
            --from-literal=CONFIG_TOKEN="$CONFIG_TOKEN" \
            -n {{.NAMESPACE}}
          echo "🔄 forgejo-runner-secret: 已重新建立"
        fi

        # 向 Forgejo 註冊 runner
        kubectl delete pod runner-reg -n {{.NAMESPACE}} --ignore-not-found 2>/dev/null
        kubectl run -n {{.NAMESPACE}} runner-reg \
          --image=code.forgejo.org/forgejo/runner:12.7.3 \
          --restart=Never \
          --env="TOKEN=$CONFIG_TOKEN" \
          --env="CONFIG_NAME=$CONFIG_NAME" \
          -- sh -c "cd /tmp && forgejo-runner register --no-interactive \
            --token \"\${TOKEN}\" \
            --name \"\${CONFIG_NAME}\" \
            --instance $CONFIG_INSTANCE \
            --labels 'linux,self-hosted,ubuntu' >/dev/null 2>&1 && cat .runner"

        echo "等待 runner 註冊完成..."
        kubectl wait -n {{.NAMESPACE}} pod/runner-reg \
          --for=jsonpath='{.status.phase}'=Succeeded \
          --timeout=60s

        RUNNER_JSON=$(kubectl logs -n {{.NAMESPACE}} runner-reg)
        kubectl delete pod runner-reg -n {{.NAMESPACE}} --ignore-not-found 2>/dev/null

        # forgejo-runner-config（比對後決定是否重建）
        existing_rc=$(kubectl get secret forgejo-runner-config -n {{.NAMESPACE}} -o jsonpath='{.data}' 2>/dev/null || true)
        new_rc=$(kubectl create secret generic forgejo-runner-config \
          --from-literal=".runner=$RUNNER_JSON" \
          -n {{.NAMESPACE}} --dry-run=client -o jsonpath='{.data}' 2>/dev/null)
        if [ "$existing_rc" = "$new_rc" ]; then
          echo "✅ forgejo-runner-config: 內容一致，跳過"
        else
          kubectl delete secret forgejo-runner-config -n {{.NAMESPACE}} --ignore-not-found
          kubectl create secret generic forgejo-runner-config \
            --from-literal=".runner=$RUNNER_JSON" \
            -n {{.NAMESPACE}}
          echo "🔄 forgejo-runner-config: 已重新建立"
        fi

        echo "✅ Runner 設定完成"

  argocd-repo-creds:
    desc: "🔑 建立 ArgoCD 存取 Forgejo repo 的憑證"
    silent: true
    vars:
      ENV: ./environment/.env
    cmds:
      - |
        kubectl create secret generic argocd-forgejo-repo \
          --from-literal=type=git \
          --from-literal=url=http://forgejo-http.forgejo.svc.cluster.local:3000/sureway_tachiung/indium.git \
          --from-literal=username="$(grep '^FORGEJO_ADMIN_USERNAME=' {{.ENV}} | cut -d'=' -f2-)" \
          --from-literal=password="$(grep '^FORGEJO_ADMIN_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)" \
          -n argocd --dry-run=client -o yaml \
          | kubectl label --local -f - argocd.argoproj.io/secret-type=repository -o yaml \
          | kubectl apply -f -
        echo "✅ argocd-forgejo-repo 建立完成"

  ssh-git-creds:
    desc: "🔑 注入 Forgejo SSH deploy key（argocd-image-updater）及 API token（registry-cleaner）"
    silent: true
    vars:
      ENV: ./environment/.env
      ORG: sureway_tachiung
      REPO: indium
    cmds:
      - |
        FORGEJO_USER="$(grep '^FORGEJO_ADMIN_USERNAME=' {{.ENV}} | cut -d'=' -f2-)"
        FORGEJO_PASS="$(grep '^FORGEJO_ADMIN_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        [ -z "$FORGEJO_USER" ] && echo "❌ FORGEJO_ADMIN_USERNAME 未設定" && exit 1

        FORGEJO_READY=$(kubectl get pod -n forgejo \
          -l app.kubernetes.io/name=forgejo \
          --field-selector=status.phase=Running \
          --no-headers 2>/dev/null | wc -l) || true
        if [ -z "$FORGEJO_READY" ] || [ "$FORGEJO_READY" -lt 1 ]; then
          echo "❌ Forgejo pod 尚未啟動"
          exit 1
        fi

        POD=$(kubectl get pod -n forgejo -l app.kubernetes.io/name=forgejo -o jsonpath='{.items[0].metadata.name}')
        [ -z "$POD" ] && echo "❌ 找不到 Forgejo pod" && exit 1

        if [ -d /dev/shm ]; then TMPDIR=$(mktemp -d /dev/shm/tmp-XXXXXX); else TMPDIR=$(mktemp -d); fi
        trap "rm -rf $TMPDIR" EXIT

        # 產生 SSH deploy key，注入 Forgejo，並建立 K8s secret
        # 用法：add_deploy_key <title> <secret-name> <namespace> <read_only:true|false>
        # 取得 Forgejo SSH host key（從 pod 內掃，避免 cluster DNS 問題）
        KNOWN_HOSTS=$(kubectl exec -n forgejo "$POD" -- \
          ssh-keyscan -p 22 forgejo-ssh.forgejo.svc.cluster.local 2>/dev/null || true)
        if [ -z "$KNOWN_HOSTS" ]; then
          echo "⚠️  無法取得 Forgejo SSH host key，knownHosts 將略過"
        else
          echo "$KNOWN_HOSTS" > "$TMPDIR/known_hosts"
          echo "✅ Forgejo SSH host key 已取得"
        fi

        add_deploy_key() {
          _TITLE="$1"; _SECRET="$2"; _NS="$3"; _RO="$4"
          ssh-keygen -t ed25519 -f "$TMPDIR/$_TITLE" -N "" -C "$_TITLE" > /dev/null
          cat > "$TMPDIR/add_key.sh" <<SCRIPT
        #!/bin/sh
        U="$FORGEJO_USER"; P="$FORGEJO_PASS"; TITLE="$_TITLE"
        BASE="http://localhost:3000/api/v1/repos/{{.ORG}}/{{.REPO}}"
        TMPNETRC=\$(mktemp); chmod 600 "\$TMPNETRC"
        printf 'machine localhost login %s password %s\n' "\$U" "\$P" > "\$TMPNETRC"
        trap "rm -f '\$TMPNETRC'" EXIT
        KEY_ID=\$(curl -s --netrc-file "\$TMPNETRC" "\$BASE/keys" \
          | tr -d '\n' | sed 's/},{/}\n{/g' \
          | grep "\"title\":\"\$TITLE\"" \
          | grep -oE '"id":[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
        if [ -n "\$KEY_ID" ]; then
          echo "🗑  刪除舊 deploy key '\$TITLE' (id=\$KEY_ID)"
          curl -s -X DELETE --netrc-file "\$TMPNETRC" "\$BASE/keys/\$KEY_ID"
        fi
        echo "📤 新增 deploy key '\$TITLE'"
        curl -s -X POST --netrc-file "\$TMPNETRC" "\$BASE/keys" \
          -H "Content-Type: application/json" \
          -d "{\"title\":\"\$TITLE\",\"key\":\"\$(cat /tmp/ak.pub)\",\"read_only\":$_RO}"
        SCRIPT
          kubectl cp "$TMPDIR/$_TITLE.pub" "forgejo/$POD:/tmp/ak.pub"
          kubectl cp "$TMPDIR/add_key.sh" "forgejo/$POD:/tmp/add_key.sh"
          kubectl exec -n forgejo "$POD" -- sh -c "sh /tmp/add_key.sh; rm -f /tmp/add_key.sh /tmp/ak.pub"
          if [ -f "$TMPDIR/known_hosts" ]; then
            kubectl create secret generic "$_SECRET" \
              --from-file=sshPrivateKey="$TMPDIR/$_TITLE" \
              --from-file=knownHosts="$TMPDIR/known_hosts" \
              -n "$_NS" --dry-run=client -o yaml | kubectl apply -f -
          else
            kubectl create secret generic "$_SECRET" \
              --from-file=sshPrivateKey="$TMPDIR/$_TITLE" \
              -n "$_NS" --dry-run=client -o yaml | kubectl apply -f -
          fi
          echo "✅ $_SECRET ($_NS): 已建立"
        }

        add_deploy_key "argocd-image-updater"  "image-updater-git-creds"   "argocd"  false
        add_deploy_key "registry-cleaner"       "registry-cleaner-ssh-key"  "default" true

  forgejo-admin-secret:
    internal: true
    silent: true
    vars:
      ENV: ./environment/.env
    cmds:
      - |
        USERNAME="$(grep '^FORGEJO_ADMIN_USERNAME=' {{.ENV}} | cut -d'=' -f2-)"
        PASSWORD="$(grep '^FORGEJO_ADMIN_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        [ -z "$USERNAME" ] && echo "❌ FORGEJO_ADMIN_USERNAME 未設定" && exit 1
        [ -z "$PASSWORD" ] && echo "❌ FORGEJO_ADMIN_PASSWORD 未設定" && exit 1
        existing=$(kubectl get secret forgejo-admin-secret -n forgejo -o jsonpath='{.data}' 2>/dev/null || true)
        new=$(kubectl create secret generic forgejo-admin-secret \
          --from-literal=username="$USERNAME" \
          --from-literal=password="$PASSWORD" \
          -n forgejo --dry-run=client -o jsonpath='{.data}' 2>/dev/null)
        if [ "$existing" = "$new" ]; then
          echo "✅ forgejo-admin-secret: 內容一致，跳過"
        else
          kubectl delete secret forgejo-admin-secret -n forgejo --ignore-not-found
          kubectl create secret generic forgejo-admin-secret \
            --from-literal=username="$USERNAME" \
            --from-literal=password="$PASSWORD" \
            -n forgejo
          echo "🔄 forgejo-admin-secret: 已重新建立"
        fi

  registry-auth:
    desc: "🔐 建立 registry 相關 secrets（dockerconfigjson + htpasswd，從 environment/.env 讀取帳密）"
    silent: true
    vars:
      ENV: ./environment/.env
    cmds:
      - |
        USERNAME="$(grep '^REGISTRY_USERNAME=' {{.ENV}} | cut -d'=' -f2-)"
        PASSWORD="$(grep '^REGISTRY_PASSWORD=' {{.ENV}} | cut -d'=' -f2-)"
        [ -z "$USERNAME" ] && echo "❌ REGISTRY_USERNAME 未設定" && exit 1
        [ -z "$PASSWORD" ] && echo "❌ REGISTRY_PASSWORD 未設定" && exit 1
        AUTH=$(printf '%s:%s' "$USERNAME" "$PASSWORD" | base64 -w 0)
        CONFIG=$(printf '{"auths":{"registry.local":{"auth":"%s"}}}' "$AUTH")
        PULL_SECRET="local-registry-auth"
        for NS in argocd default web service; do
          kubectl create secret generic "$PULL_SECRET" \
            --from-literal=.dockerconfigjson="$CONFIG" \
            --type=kubernetes.io/dockerconfigjson \
            -n "$NS" \
            --dry-run=client -o yaml | kubectl apply -f - 2>/dev/null \
            && echo "✅ $PULL_SECRET ($NS): 已建立/更新" \
            || echo "⚠️  $PULL_SECRET ($NS): namespace 不存在，跳過"
        done
        HTPASSWD=$(docker run --rm httpd:alpine htpasswd -nbB "$USERNAME" "$PASSWORD")
        kubectl create secret generic registry-auth \
          --from-literal=htpasswd="$HTPASSWD" \
          --namespace default \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "✅ registry-auth (default): 已建立"
